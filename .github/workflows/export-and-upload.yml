name: Export Godot Web & Upload to R2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.3"
  GODOT_RELEASE: "stable"
  EXPORT_NAME: "Web"
  EXPORT_PATH: "build/web/index.html"

jobs:
  export-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip"
          unzip -q "${GODOT_FILENAME}.zip"
          mv "${GODOT_FILENAME}" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install Godot export templates
        run: |
          TEMPLATE_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TEMPLATE_FILENAME}"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -q "${TEMPLATE_FILENAME}" -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "${{ env.EXPORT_NAME }}" "${{ env.EXPORT_PATH }}"

      - name: Upload large files to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 cp build/web/index.pck  s3://${{ secrets.R2_BUCKET_NAME }}/pilgrims/index.pck  --no-progress
          aws s3 cp build/web/index.wasm s3://${{ secrets.R2_BUCKET_NAME }}/pilgrims/index.wasm --no-progress

      # Deploy the freshly exported build/web to the Vercel "pilgrims" project so
      # every push to main actually updates the live game (previously the CI only
      # exported + pushed to R2, and the deployed index.html loads the LOCAL
      # index.pck — so gameplay changes never reached players). Add a repo secret
      # VERCEL_TOKEN (Vercel → Account → Settings → Tokens) to enable this; without
      # it the step just skips, so it never breaks the build.
      - name: Deploy build/web to Vercel
        continue-on-error: true
        working-directory: build/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_KUAT9DsKKd84CyTKOm2q9Kn8
          VERCEL_PROJECT_ID: prj_cBBwE72vZOKsfnS7rY4WjJifXbFr
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "No VERCEL_TOKEN secret set — skipping auto-deploy (add it to enable push-to-deploy)."
            exit 0
          fi
          npm i -g vercel@latest
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
