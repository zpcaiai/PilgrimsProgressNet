name: Export Godot Web & Upload to R2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.3"
  GODOT_RELEASE: "stable"
  EXPORT_NAME: "Web"
  EXPORT_PATH: "build/web/index.html"

jobs:
  export-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip"
          unzip -q "${GODOT_FILENAME}.zip"
          mv "${GODOT_FILENAME}" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install Godot export templates
        run: |
          TEMPLATE_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TEMPLATE_FILENAME}"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -q "${TEMPLATE_FILENAME}" -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "${{ env.EXPORT_NAME }}" "${{ env.EXPORT_PATH }}"

      - name: Upload large files to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 cp build/web/index.pck  s3://${{ secrets.R2_BUCKET_NAME }}/sabbath/index.pck  --no-progress
          aws s3 cp build/web/index.wasm s3://${{ secrets.R2_BUCKET_NAME }}/sabbath/index.wasm --no-progress
