# Alertmanager routing. The default receiver is a generic webhook (swap for
# Slack / email / PagerDuty in production — examples below).
route:
  receiver: default-webhook
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - matchers: ['severity="critical"']
      receiver: default-webhook
      repeat_interval: 1h

receivers:
  - name: default-webhook
    webhook_configs:
      # Forwards to the Feishu/DingTalk bridge (alert-bridge service).
      # Set FEISHU_WEBHOOK / DINGTALK_WEBHOOK env on that service to enable.
      - url: http://alert-bridge:8080/
        send_resolved: true

    # --- Slack example (uncomment + set api_url) ---
