groups:
  - name: pilgrim-api
    rules:
      - alert: HighErrorRate
        expr: |
          100 * sum(rate(pilgrim_http_requests_total{status=~"5.."}[5m]))
              / clamp_min(sum(rate(pilgrim_http_requests_total[5m])), 1) > 5
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "5xx error rate above 5%"
          description: "API 5xx rate has exceeded 5% for 5 minutes."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(pilgrim_http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "p95 latency above 1s"
          description: "Overall p95 request latency has exceeded 1s for 10 minutes."

      - alert: APITargetDown
        expr: up{job="pilgrim-api"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "API target down"
          description: "Prometheus cannot scrape an API instance ({{ $labels.instance }})."

      - alert: TrafficStalled
        expr: sum(rate(pilgrim_http_requests_total[5m])) == 0
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "No traffic for 15m"
          description: "No requests are reaching the API — possible outage or routing break."
