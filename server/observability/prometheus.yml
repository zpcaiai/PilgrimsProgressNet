global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: pilgrim-api
    metrics_path: /metrics
    static_configs:
      # Docker DNS resolves "app" to all replicas; Prometheus scrapes each.
      - targets: ["app:8000"]
