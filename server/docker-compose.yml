services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pilgrim
      POSTGRES_PASSWORD: pilgrim
      POSTGRES_DB: pilgrim
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilgrim"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      # override .env host names for the compose network
      PP_DATABASE_URL: postgresql+asyncpg://pilgrim:pilgrim@postgres:5432/pilgrim
      PP_REDIS_URL: redis://redis:6379/0
      PP_ENV: dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Horizontal scaling: `docker compose up --scale app=3` runs 3 replicas;
    # nginx load-balances across them (the app layer is stateless).
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - app

volumes:
  pgdata:
