# Reverse proxy + load balancer. Docker's embedded DNS resolves "app" to all
# replicas; nginx round-robins across them. Add TLS termination here in prod.
upstream pilgrim_app {
    server app:8000;
}

# Basic per-IP rate limit at the edge (app also rate-limits via Redis).
limit_req_zone $binary_remote_addr zone=pilgrim_rl:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types application/json text/plain;

    location /healthz {
        proxy_pass http://pilgrim_app;
    }

    location / {
        limit_req zone=pilgrim_rl burst=40 nodelay;
        proxy_pass http://pilgrim_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
