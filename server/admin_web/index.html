<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title data-i18n="title">天路历程 · 管理后台</title>
<style>
  :root { --bg:#0d0f15; --panel:#161a24; --line:#252b3a; --txt:#dfe4ee; --muted:#8a93a6;
          --gold:#f0d488; --good:#6fc77e; --bad:#e06868; --warn:#e0c24f; --blue:#6fa8e0; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif; }
  header { background:var(--panel); border-bottom:1px solid var(--line); padding:14px 20px;
           display:flex; gap:12px; align-items:center; flex-wrap:wrap; position:sticky; top:0; z-index:5; }
  header h1 { font-size:18px; margin:0 16px 0 0; color:var(--gold); }
  input, button, select { font:inherit; color:var(--txt); background:#0f1320; border:1px solid var(--line);
           border-radius:7px; padding:7px 10px; }
  button { cursor:pointer; background:#1d2433; }
  button:hover { border-color:var(--gold); }
  button.good { border-color:var(--good); } button.bad { border-color:var(--bad); }
  main { padding:20px; max-width:1100px; margin:0 auto; display:grid; gap:18px; }
  section { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
  section h2 { margin:0 0 12px; font-size:16px; color:var(--gold); }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:middle; }
  th { color:var(--muted); font-weight:600; }
  .tag { padding:2px 8px; border-radius:20px; font-size:12px; }
  .s-pending{ background:#3a350f; color:var(--warn); } .s-appealed{ background:#10283f; color:var(--blue); }
  .s-rejected{ background:#3a1414; color:var(--bad); } .s-approved{ background:#10301a; color:var(--good); }
  .muted { color:var(--muted); }
  .bar { height:8px; background:#0f1320; border-radius:4px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:var(--blue); }
  #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1d2433;
           border:1px solid var(--line); border-radius:8px; padding:10px 16px; opacity:0; transition:.3s; }
  #toast.show { opacity:1; }
  .pill { font-size:12px; color:var(--muted); }
  #login { position:fixed; inset:0; background:rgba(8,10,15,.92); display:flex;
           align-items:center; justify-content:center; z-index:10; }
  #login .card { background:var(--panel); border:1px solid var(--line); border-radius:14px;
           padding:28px 30px; width:340px; display:grid; gap:12px; }
  #login h2 { margin:0 0 4px; color:var(--gold); }
  #login input { width:100%; }
  .hide { display:none !important; }
</style>
</head>
<body>
<div id="login">
  <div class="card">
    <h2 data-i18n="login.title">管理后台登录</h2>
    <input id="li_base" data-i18n-ph="login.base_ph" placeholder="API base，如 /api/v1" />
    <input id="li_user" data-i18n-ph="login.user_ph" placeholder="用户名" autocomplete="username" />
    <input id="li_pass" type="password" data-i18n-ph="login.pass_ph" placeholder="密码" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="good" onclick="doLogin()" data-i18n="login.btn">登录</button>
    <span id="li_err" class="muted"></span>
  </div>
</div>

<header>
  <h1 data-i18n="title">天路历程 · 管理后台</h1>
  <span id="conn" class="pill" data-i18n="conn.disconnected">未连接</span>
  <span style="flex:1"></span>
  <button id="lang_btn" onclick="toggleLang()">English</button>
  <button onclick="logout()" data-i18n="header.logout">退出登录</button>
</header>

<main>
  <section>
    <h2 data-i18n="sec.reviews">成绩复核队列</h2>
    <div class="row">
      <label data-i18n="lbl.status">状态
        <select id="rstatus" onchange="loadReviews()">
          <option value="pending" data-i18n="opt.pending">待重算 pending</option>
          <option value="appealed" data-i18n="opt.appealed">申诉中 appealed</option>
          <option value="rejected" data-i18n="opt.rejected">已拒绝 rejected</option>
          <option value="approved" data-i18n="opt.approved">已通过 approved</option>
        </select>
      </label>
      <button onclick="loadReviews()" data-i18n="btn.refresh">刷新</button>
      <button class="good" onclick="recompute()" data-i18n="btn.run_recompute">运行重算队列</button>
      <span id="rcount" class="muted"></span>
    </div>
    <table>
      <thead><tr><th data-i18n="th.player">玩家</th><th data-i18n="th.board">榜/难度</th><th data-i18n="th.score">分数</th><th data-i18n="th.season">赛季</th><th data-i18n="th.status">状态</th><th data-i18n="th.reason">原因</th><th data-i18n="th.action">操作</th></tr></thead>
      <tbody id="reviews"><tr><td colspan="7" class="muted" data-i18n="tbl.fill_hint">填好 API 与 token 后点刷新。</td></tr></tbody>
    </table>
  </section>

  <section>
    <h2 data-i18n="sec.settle">赛季结算</h2>
    <div class="row">
      <input id="season" size="12" data-i18n-ph="settle.season_ph" placeholder="赛季 id，如 2026-S1" />
      <button onclick="settle()" data-i18n="btn.settle">结算该赛季</button>
      <button onclick="rollover()" data-i18n="btn.rollover">结算上一季（rollover）</button>
    </div>
    <pre id="settleOut" class="muted" style="white-space:pre-wrap;margin:0"></pre>
  </section>

  <section>
    <h2 data-i18n="sec.chat">聊天管理（禁言）</h2>
    <div class="row">
      <input id="mute_pid" size="30" data-i18n-ph="mute.pid_ph" placeholder="玩家 player_id" />
      <input id="mute_min" size="6" type="number" value="60" /> <span data-i18n="mute.minutes">分钟</span>
      <button class="bad" onclick="mute()" data-i18n="btn.mute">禁言</button>
      <button onclick="unmute()" data-i18n="btn.unmute">解除</button>
      <span id="muteOut" class="muted"></span>
    </div>
  </section>

  <section>
    <h2 data-i18n="sec.funnel">章节漏斗（数据统计）</h2>
    <div class="row"><button onclick="loadFunnel()" data-i18n="btn.refresh">刷新</button></div>
    <table>
      <thead><tr><th data-i18n="th.chapter">章节</th><th data-i18n="th.started">开始</th><th data-i18n="th.completed">完成</th><th data-i18n="th.rate">完成率</th><th style="width:35%"></th></tr></thead>
      <tbody id="funnel"><tr><td colspan="5" class="muted" data-i18n="tbl.refresh_hint">点刷新加载。</td></tr></tbody>
    </table>
  </section>
</main>

<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
let cfg = { base: localStorage.getItem("pp_base") || "/api/v1", session: localStorage.getItem("pp_session") || "" };

// ---- i18n -----------------------------------------------------------------
const I18N = {
  "title":            { zh:"天路历程 · 管理后台",  en:"Pilgrim's Progress · Admin" },
  "login.title":      { zh:"管理后台登录",         en:"Admin Login" },
  "login.base_ph":    { zh:"API base，如 /api/v1", en:"API base, e.g. /api/v1" },
  "login.user_ph":    { zh:"用户名",               en:"Username" },
  "login.pass_ph":    { zh:"密码",                 en:"Password" },
  "login.btn":        { zh:"登录",                 en:"Sign in" },
  "header.logout":    { zh:"退出登录",             en:"Sign out" },
  "conn.disconnected":{ zh:"未连接",               en:"Disconnected" },
  "conn.connected":   { zh:"已连接",               en:"Connected" },
  "conn.error":       { zh:"错误 ",                en:"Error " },
  "sec.reviews":      { zh:"成绩复核队列",         en:"Score Review Queue" },
  "lbl.status":       { zh:"状态",                 en:"Status" },
  "opt.pending":      { zh:"待重算 pending",        en:"Pending" },
  "opt.appealed":     { zh:"申诉中 appealed",       en:"Appealed" },
  "opt.rejected":     { zh:"已拒绝 rejected",       en:"Rejected" },
  "opt.approved":     { zh:"已通过 approved",       en:"Approved" },
  "btn.refresh":      { zh:"刷新",                 en:"Refresh" },
  "btn.run_recompute":{ zh:"运行重算队列",         en:"Run recompute" },
  "th.player":        { zh:"玩家",                 en:"Player" },
  "th.board":         { zh:"榜/难度",              en:"Board / Diff" },
  "th.score":         { zh:"分数",                 en:"Score" },
  "th.season":        { zh:"赛季",                 en:"Season" },
  "th.status":        { zh:"状态",                 en:"Status" },
  "th.reason":        { zh:"原因",                 en:"Reason" },
  "th.action":        { zh:"操作",                 en:"Action" },
  "tbl.fill_hint":    { zh:"填好 API 与 token 后点刷新。", en:"Set API & token, then Refresh." },
  "sec.settle":       { zh:"赛季结算",             en:"Season Settlement" },
  "settle.season_ph": { zh:"赛季 id，如 2026-S1",   en:"Season id, e.g. 2026-S1" },
  "btn.settle":       { zh:"结算该赛季",           en:"Settle season" },
  "btn.rollover":     { zh:"结算上一季（rollover）", en:"Settle previous (rollover)" },
  "sec.chat":         { zh:"聊天管理（禁言）",      en:"Chat Moderation (Mute)" },
  "mute.pid_ph":      { zh:"玩家 player_id",        en:"player_id" },
  "mute.minutes":     { zh:"分钟",                 en:"minutes" },
  "btn.mute":         { zh:"禁言",                 en:"Mute" },
  "btn.unmute":       { zh:"解除",                 en:"Unmute" },
  "sec.funnel":       { zh:"章节漏斗（数据统计）",  en:"Chapter Funnel (Stats)" },
  "th.chapter":       { zh:"章节",                 en:"Chapter" },
  "th.started":       { zh:"开始",                 en:"Started" },
  "th.completed":     { zh:"完成",                 en:"Completed" },
  "th.rate":          { zh:"完成率",               en:"Rate" },
  "tbl.refresh_hint": { zh:"点刷新加载。",          en:"Click Refresh to load." },
  "tbl.no_records":   { zh:"无记录。",             en:"No records." },
  "tbl.no_data":      { zh:"暂无数据。",            en:"No data yet." },
  "btn.approve":      { zh:"批准",                 en:"Approve" },
  "btn.reject":       { zh:"拒绝",                 en:"Reject" },
  "toast.logged_in":  { zh:"已登录",               en:"Signed in" },
  "toast.session_expired": { zh:"会话过期，请重新登录", en:"Session expired, please sign in" },
  "toast.req_failed": { zh:"请求失败 ",            en:"Request failed " },
  "err.bad_login":    { zh:"用户名或密码错误",      en:"Wrong username or password" },
  "err.login_failed": { zh:"登录失败 ",            en:"Login failed " },
  "err.cant_connect": { zh:"无法连接 ",            en:"Cannot connect " },
  "count.rows":       { zh:"条",                   en:"rows" },
  "review.note":      { zh:"后台人工复核",          en:"Manual admin review" },
  "toast.approved_ranked": { zh:"已批准并进榜",     en:"Approved & ranked" },
  "toast.rejected":   { zh:"已拒绝",               en:"Rejected" },
  "toast.enter_season": { zh:"请输入赛季 id",       en:"Enter a season id" },
  "toast.already_settled": { zh:"该赛季已结算",     en:"Season already settled" },
  "toast.rollover_done": { zh:"rollover 完成",      en:"Rollover done" },
  "toast.enter_pid":  { zh:"请输入 player_id",      en:"Enter a player_id" },
  "toast.muted":      { zh:"已禁言",               en:"Muted" },
  "toast.unmuted":    { zh:"已解除禁言",            en:"Unmuted" }
};
let lang = localStorage.getItem("pp_lang") || ((navigator.language || "en").startsWith("zh") ? "zh" : "en");
function t(key) { const e = I18N[key]; return e ? (e[lang] || e.en) : key; }
function applyI18n() {
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = t(el.getAttribute("data-i18n")); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => { el.placeholder = t(el.getAttribute("data-i18n-ph")); });
  $("lang_btn").textContent = lang === "zh" ? "English" : "中文";
}
function toggleLang() { lang = lang === "zh" ? "en" : "zh"; localStorage.setItem("pp_lang", lang); applyI18n(); }

function toast(msg) { const t = $("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 2600); }

function showLogin(show) { $("login").classList.toggle("hide", !show); }
async function doLogin() {
  cfg.base = ($("li_base").value.trim() || "/api/v1").replace(/\/$/, "");
  const username = $("li_user").value.trim(), password = $("li_pass").value;
  try {
    const r = await fetch(cfg.base + "/admin/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }) });
    if (!r.ok) { $("li_err").textContent = r.status === 401 ? t("err.bad_login") : (t("err.login_failed") + r.status); return; }
    const data = await r.json();
    cfg.session = data.token;
    localStorage.setItem("pp_base", cfg.base); localStorage.setItem("pp_session", cfg.session);
    $("li_err").textContent = ""; showLogin(false); toast(t("toast.logged_in")); loadReviews();
  } catch (e) { $("li_err").textContent = t("err.cant_connect") + cfg.base; }
}
function logout() { cfg.session = ""; localStorage.removeItem("pp_session"); showLogin(true); }

async function api(method, path, body) {
  const opt = { method, headers: { "Authorization": "Bearer " + cfg.session } };
  if (body !== undefined) { opt.headers["Content-Type"] = "application/json"; opt.body = JSON.stringify(body); }
  const r = await fetch(cfg.base + path, opt);
  $("conn").textContent = r.ok ? t("conn.connected") : (t("conn.error") + r.status);
  $("conn").style.color = r.ok ? "var(--good)" : "var(--bad)";
  if (r.status === 401 || r.status === 403) { toast(t("toast.session_expired")); showLogin(true); throw new Error("auth"); }
  if (!r.ok) { toast(t("toast.req_failed") + r.status); throw new Error(r.status); }
  const ct = r.headers.get("content-type") || "";
  return ct.includes("json") ? r.json() : r.text();
}
const esc = (s) => String(s).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));

async function loadReviews() {
  const status = $("rstatus").value;
  let rows;
  try { rows = await api("GET", `/admin/reviews?status=${status}&limit=200`); } catch { return; }
  $("rcount").textContent = `${rows.length} ${t("count.rows")}`;
  const tb = $("reviews");
  if (!rows.length) { tb.innerHTML = `<tr><td colspan="7" class="muted">${t("tbl.no_records")}</td></tr>`; return; }
  tb.innerHTML = rows.map(r => `
    <tr>
      <td title="${esc(r.player_id)}">${esc(r.player_id.slice(0,8))}…</td>
      <td>${esc(r.board)} / ${esc(r.difficulty)}</td>
      <td>${r.score}</td>
      <td>${esc(r.season)}</td>
      <td><span class="tag s-${esc(r.status)}">${esc(r.status)}</span></td>
      <td class="muted" title="${esc(r.reason)}">${esc((r.reason||"").slice(0,40))}</td>
      <td>${ r.status === "appealed"
        ? `<button class="good" onclick="resolve('${r.id}','approve')">${t("btn.approve")}</button>
           <button class="bad" onclick="resolve('${r.id}','reject')">${t("btn.reject")}</button>`
        : "" }</td>
    </tr>`).join("");
}
async function recompute() { const r = await api("POST", "/admin/reviews/recompute");
  toast(lang === "zh" ? `处理 ${r.processed}：通过 ${r.approved}，拒绝 ${r.rejected}`
                      : `Processed ${r.processed}: ${r.approved} approved, ${r.rejected} rejected`);
  loadReviews(); }
async function resolve(id, decision) { await api("POST", `/admin/reviews/${id}/resolve`, { decision, note: t("review.note") });
  toast(decision === "approve" ? t("toast.approved_ranked") : t("toast.rejected")); loadReviews(); }

async function settle() {
  const s = $("season").value.trim(); if (!s) { toast(t("toast.enter_season")); return; }
  const r = await api("POST", `/admin/seasons/${s}/settle`);
  $("settleOut").textContent = JSON.stringify(r, null, 2);
  toast(r.already_settled ? t("toast.already_settled")
        : (lang === "zh" ? `发放 ${r.granted} 份奖励` : `Granted ${r.granted} rewards`));
}
async function rollover() {
  const r = await api("POST", "/admin/seasons/rollover");
  $("settleOut").textContent = JSON.stringify(r, null, 2); toast(t("toast.rollover_done"));
}

async function mute() {
  const pid = $("mute_pid").value.trim(); const min = $("mute_min").value || 60;
  if (!pid) { toast(t("toast.enter_pid")); return; }
  await api("POST", `/admin/mute/${encodeURIComponent(pid)}?minutes=${min}`);
  $("muteOut").textContent = lang === "zh" ? `已禁言 ${pid}（${min} 分钟）` : `Muted ${pid} (${min} min)`;
  toast(t("toast.muted"));
}
async function unmute() {
  const pid = $("mute_pid").value.trim(); if (!pid) { toast(t("toast.enter_pid")); return; }
  await api("DELETE", `/admin/mute/${encodeURIComponent(pid)}`);
  $("muteOut").textContent = lang === "zh" ? `已解除 ${pid}` : `Unmuted ${pid}`; toast(t("toast.unmuted"));
}

async function loadFunnel() {
  let rows; try { rows = await api("GET", "/stats/overview"); } catch { return; }
  const tb = $("funnel");
  if (!rows.length) { tb.innerHTML = `<tr><td colspan="5" class="muted">${t("tbl.no_data")}</td></tr>`; return; }
  tb.innerHTML = rows.map(r => `
    <tr>
      <td>${esc(r.chapter_id)}</td><td>${r.started}</td><td>${r.completed}</td>
      <td>${(r.completion_rate*100).toFixed(1)}%</td>
      <td><div class="bar"><i style="width:${Math.round(r.completion_rate*100)}%"></i></div></td>
    </tr>`).join("");
}

// Boot: apply language, prefill base, show login unless we already have a session.
applyI18n();
$("li_base").value = cfg.base;
if (cfg.session) { showLogin(false); loadReviews(); } else { showLogin(true); }
</script>
</body>
</html>
